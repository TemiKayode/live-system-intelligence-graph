name: LSIG CI

on:
  push:
    branches: [main, "feat/*", "fix/*"]
  pull_request:
    branches: [main]

env:
  NEO4J_URI: bolt://localhost:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: lsig_dev
  LSIG_STATE_DIR: /tmp/lsig_state

jobs:
  # ─── Python Layers 1–4 ──────────────────────────────────────────────────────
  python-layer1:
    name: Layers 1–4 — type check + unit tests
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/lsig_dev
          NEO4JLABS_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p lsig_dev 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt mypy ruff pytest pytest-asyncio httpx

      - name: Apply Neo4j schema
        run: |
          python - <<'EOF'
          from neo4j import GraphDatabase
          import time, sys
          for _ in range(20):
              try:
                  d = GraphDatabase.driver("bolt://localhost:7687", auth=("neo4j","lsig_dev"))
                  d.verify_connectivity()
                  break
              except Exception:
                  time.sleep(3)
          else:
              sys.exit("Neo4j did not become ready")
          schema = open("schema/v1_init.cypher").read()
          with d.session() as s:
              for stmt in schema.split(";"):
                  stmt = stmt.strip()
                  if stmt and not stmt.startswith("//"):
                      try:
                          s.run(stmt)
                      except Exception as e:
                          print(f"WARN: {e}")
          print("Schema applied")
          EOF

      - name: mypy type check
        run: mypy layer1/ layer2/ layer3/ layer4/ --ignore-missing-imports
        continue-on-error: true

      - name: ruff lint
        run: ruff check layer1/ layer2/ layer3/ layer4/ tests/ --ignore E501
        continue-on-error: true

      - name: Unit tests (mocked, no external services)
        env:
          ANTHROPIC_API_KEY: test-key-not-real
          LSIG_CERT_SECRET: test-cert-secret
          LSIG_AUTH_DISABLED: "true"
        run: pytest tests/test_code_ingester.py tests/test_runtime_join.py tests/test_security.py tests/test_ownership_pii.py -v --tb=short -p no:neo4j

      - name: Neo4j integration tests
        run: pytest tests/ -v --tb=short -k "neo4j" || true

  # ─── Python Layers 5–6 ──────────────────────────────────────────────────────
  python-layer56:
    name: Layers 5–6 — Graph Query + Certificate Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run Layer 5+6 tests
        env:
          ANTHROPIC_API_KEY: test-key-not-real
          LSIG_CERT_SECRET: test-cert-secret
          LSIG_AUTH_DISABLED: "true"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: |
          pytest tests/test_graph_query.py tests/test_certificate_engine.py \
            -v --tb=short --cov=layer5 --cov=layer6 --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ─── Go eBPF agent ───────────────────────────────────────────────────────────
  go-runtime-agent:
    name: Layer 2 — Go runtime agent build + vet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install eBPF build deps
        run: sudo apt-get install -y clang llvm libbpf-dev || true

      - name: go mod download
        working-directory: runtime_agent
        run: go mod download

      - name: go mod tidy check
        working-directory: runtime_agent
        run: |
          go mod tidy
          git diff --exit-code go.sum || (echo "go.sum is out of date — run go mod tidy" && exit 1)
        continue-on-error: true

      - name: go vet
        working-directory: runtime_agent
        run: go vet ./...

      - name: go build
        working-directory: runtime_agent
        run: go build -o /dev/null ./...

  # ─── Helm chart validation ───────────────────────────────────────────────────
  helm-lint:
    name: Helm chart lint + template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint helm/lsig/ --set secrets.secretName=test

      - name: Helm template (dry-run)
        run: |
          helm template lsig helm/lsig/ \
            --set secrets.secretName=test \
            --set neo4j.enabled=false \
            --set kafka.enabled=false \
            > /dev/null

  # ─── Dashboard TypeScript build ──────────────────────────────────────────────
  dashboard-build:
    name: Dashboard TypeScript build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build
