apiVersion: v2
name: lsig
description: Live System Intelligence Graph — full-stack deployment
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: neo4j
    version: "5.x.x"
    repository: "https://helm.neo4j.com/neo4j"
    condition: neo4j.enabled
  - name: kafka
    version: "29.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
