apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lsig.fullname" . }}-cert-api
  labels:
    {{- include "lsig.labels" . | nindent 4 }}
    app.kubernetes.io/component: cert-api
spec:
  replicas: {{ .Values.replicaCount.certApi }}
  selector:
    matchLabels:
      {{- include "lsig.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cert-api
  template:
    metadata:
      labels:
        {{- include "lsig.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cert-api
    spec:
      containers:
        - name: cert-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "layer6.certificate_api:app", "--host", "0.0.0.0", "--port", "8006", "--workers", "2"]
          ports:
            - containerPort: 8006
              name: http
          env:
            - name: NEO4J_URI
              value: {{ .Values.env.NEO4J_URI | quote }}
            - name: NEO4J_USER
              value: {{ .Values.env.NEO4J_USER | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: neo4j-password
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: anthropic-api-key
            - name: LSIG_CERT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: cert-secret
            - name: VICTORIAMETRICS_URL
              value: {{ .Values.env.VICTORIAMETRICS_URL | quote }}
          resources:
            {{- toYaml .Values.resources.certApi | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lsig.fullname" . }}-cert-api
  labels:
    {{- include "lsig.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.certApiPort }}
      targetPort: 8006
      name: http
  selector:
    {{- include "lsig.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cert-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lsig.fullname" . }}-webhook
  labels:
    {{- include "lsig.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: {{ .Values.replicaCount.webhook }}
  selector:
    matchLabels:
      {{- include "lsig.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        {{- include "lsig.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
    spec:
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "layer6.github_webhook:app", "--host", "0.0.0.0", "--port", "8007"]
          ports:
            - containerPort: 8007
              name: http
          env:
            - name: LSIG_GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: github-webhook-secret
            - name: LSIG_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: github-token
            - name: NEO4J_URI
              value: {{ .Values.env.NEO4J_URI | quote }}
            - name: NEO4J_USER
              value: {{ .Values.env.NEO4J_USER | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: neo4j-password
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: anthropic-api-key
            - name: LSIG_CERT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: cert-secret
            - name: VICTORIAMETRICS_URL
              value: {{ .Values.env.VICTORIAMETRICS_URL | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 15
