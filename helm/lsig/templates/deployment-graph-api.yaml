apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lsig.fullname" . }}-graph-api
  labels:
    {{- include "lsig.labels" . | nindent 4 }}
    app.kubernetes.io/component: graph-api
spec:
  replicas: {{ .Values.replicaCount.graphApi }}
  selector:
    matchLabels:
      {{- include "lsig.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: graph-api
  template:
    metadata:
      labels:
        {{- include "lsig.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: graph-api
    spec:
      containers:
        - name: graph-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "layer5.graph_api:app", "--host", "0.0.0.0", "--port", "8005", "--workers", "2"]
          ports:
            - containerPort: 8005
              name: http
          env:
            - name: NEO4J_URI
              value: {{ .Values.env.NEO4J_URI | quote }}
            - name: NEO4J_USER
              value: {{ .Values.env.NEO4J_USER | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: neo4j-password
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: anthropic-api-key
            - name: VICTORIAMETRICS_URL
              value: {{ .Values.env.VICTORIAMETRICS_URL | quote }}
            - name: WEAVIATE_URL
              value: {{ .Values.env.WEAVIATE_URL | quote }}
            - name: LSIG_AUTH_DISABLED
              value: {{ .Values.env.LSIG_AUTH_DISABLED | quote }}
          resources:
            {{- toYaml .Values.resources.graphApi | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lsig.fullname" . }}-graph-api
  labels:
    {{- include "lsig.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.graphApiPort }}
      targetPort: 8005
      name: http
  selector:
    {{- include "lsig.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: graph-api
